name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y cmake g++

    - name: Configure banking with tests
      run: |
        cd banking
        cmake -H. -B_build -DBUILD_TESTS=ON -DCMAKE_CXX_FLAGS="-Wno-error"
        cd ..

    - name: Build banking tests
      run: |
        cd banking
        cmake --build _build
        cd ..

    - name: Run banking tests
      run: |
        cd banking/_build
        ./banking_check
        cd ../..
