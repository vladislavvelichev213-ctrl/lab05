name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y cmake g++

    - name: Configure main project
      run: cmake -H. -B_build -DBUILD_TESTS=ON

    - name: Build main project
      run: cmake --build _build

    - name: Run main tests
      run: ctest --test-dir _build --output-on-failure

    - name: Configure banking project
      run: |
        cd banking
        cmake -H. -B_build -DBUILD_TESTS=ON
        cd ..

    - name: Build banking project
      run: |
        cd banking
        cmake --build _build
        cd ..

    - name: Run banking tests
      run: |
        cd banking/_build
        ./banking_check
        cd ../..

