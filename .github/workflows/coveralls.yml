name: Coveralls

on:
  push:
    branches: [ main ]

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y cmake g++ lcov

    - name: Configure banking with coverage
      run: |
        cd banking
        cmake -H. -B_build -DBUILD_TESTS=ON -DCMAKE_CXX_FLAGS="--coverage"
        cd ..

    - name: Build and run tests
      run: |
        cd banking
        cmake --build _build
        cd _build
        ./banking_check
        cd ../..

    - name: Collect coverage data
      run: |
        cd banking
        lcov --capture --directory . --output-file coverage.info --no-external
        lcov --remove coverage.info '*/_build/*' '*/tests/*' '*/usr/*' '*/third-party/*' --output-file coverage.info
        cd ..

    - name: Upload to Coveralls
      uses: coverallsapp/github-action@v2
      with:
        file: banking/coverage.info
        format: lcov
        github-token: ${{ secrets.GITHUB_TOKEN }}
        coveralls-token: ${{ secrets.COVERALLS_REPO_TOKEN }}
