name: Coveralls

on:
  push:
    branches: [ main ]

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y cmake g++ lcov

    - name: Configure with coverage
      run: cmake -H. -B_build -DBUILD_TESTS=ON -DCMAKE_CXX_FLAGS="--coverage -fprofile-arcs -ftest-coverage"

    - name: Build
      run: cmake --build _build

    - name: Run tests
      run: |
        cd _build
        ctest --output-on-failure
        cd ..

    - name: Collect coverage data
      run: |
        lcov --capture --directory . --output-file coverage.info --no-external
        lcov --remove coverage.info '*/_build/*' '*/tests/*' '*/usr/*' '*/third-party/*' --output-file coverage.info
        lcov --list coverage.info

    - name: Upload to Coveralls
      uses: coverallsapp/github-action@v2
      with:
        file: coverage.info
        format: lcov
        github-token: ${{ secrets.GITHUB_TOKEN }}
